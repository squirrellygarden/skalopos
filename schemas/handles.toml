# Skalapos handle type schema — single source of truth.
#
# Every handle type that the kernel recognizes is declared here. tools/gen_syscalls.py
# reads this file and emits:
#   - kernel/handle/types_generated.h    (the enum handle_type_t)
#   - userland/libc/include/skalops/handle.h (public handle type definitions)
#
# Handle types are permanent ABI. To add a new type, append it with the next
# sequential value. NEVER renumber.
#
# For file handles, the subtype field carries a device_class_t value to distinguish
# between regular files, block devices, character devices, etc. Device classes
# are defined separately in a device schema.
#
# Layout: handle_type_t is an unsigned 32-bit enum.
#   0         H_NONE        (reserved; invalid entry marker)
#   1-7       kernel object types (file, directory, channel, process, thread, timer, shared memory)
#   8+        reserved for future kernel types and extensions

[[handle_type]]
value    = 0
name     = "H_NONE"
describe = "invalid or uninitialized handle type"

[[handle_type]]
value    = 1
name     = "H_FILE"
describe = "a file, stream, or device; subtype carries the device class"

[[handle_type]]
value    = 2
name     = "H_DIR"
describe = "a directory"

[[handle_type]]
value    = 3
name     = "H_CHNL"
describe = "a channel for inter-process communication"

[[handle_type]]
value    = 4
name     = "H_PROC"
describe = "a process"

[[handle_type]]
value    = 5
name     = "H_THREAD"
describe = "a thread"

[[handle_type]]
value    = 6
name     = "H_TIMER"
describe = "a timer"

[[handle_type]]
value    = 7
name     = "H_SHM"
describe = "a shared memory segment"
